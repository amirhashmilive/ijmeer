<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Articles &amp; Citation Index — IJMEER</title>
  <meta name="description" content="Browse, search, and export citations for all articles published in IJMEER. Supports APA 7th, MLA 9th, and BibTeX formats.">
  <link rel="canonical" href="https://www.ijmeer.com/citations.html">
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);})(window,document,'script','dataLayer','GTM-NWHDPZRK');</script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2FNJ68WF8J"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-2FNJ68WF8J');</script>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .citation-controls {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 36px; flex-wrap: wrap; gap: 16px;
      background: var(--bg-2); padding: 22px 28px;
      border-radius: var(--r-xl); border: 1px solid var(--border);
    }
    .format-toggle {
      display: flex; gap: 0; border: 2px solid var(--border);
      border-radius: var(--r-full); overflow: hidden; flex-shrink: 0;
    }
    .format-btn {
      padding: 8px 20px; font-size: 0.82rem; font-weight: 700;
      background: transparent; border: none; cursor: pointer;
      color: var(--text-3); transition: var(--t);
      font-family: var(--font-sans); white-space: nowrap;
    }
    .format-btn:hover { color: var(--text-1); }
    .format-btn.active { background: var(--blue); color: #fff; }
    .subject-group-header {
      font-family: var(--font-serif); font-size: 1.2rem; font-weight: 800;
      color: var(--navy); border-bottom: 2px solid var(--blue); padding-bottom: 10px;
      margin-bottom: 20px; margin-top: 48px; display: flex; align-items: center; gap: 12px;
    }
    .subject-group-header:first-child { margin-top: 0; }
    .subject-count {
      font-size: 0.7rem; font-weight: 800; padding: 3px 10px;
      background: rgba(37,99,235,0.1); color: var(--blue);
      border-radius: var(--r-full); font-family: var(--font-sans);
    }
    .citation-item {
      padding: 22px 24px; background: var(--bg);
      border-left: 4px solid var(--blue); border-radius: 0 var(--r-lg) var(--r-lg) 0;
      border: 1px solid var(--border); border-left: 4px solid var(--blue);
      margin-bottom: 14px; transition: var(--t);
      position: relative;
    }
    .citation-item:hover { border-color: var(--blue); box-shadow: var(--sh-sm); }
    .citation-paper-title {
      font-family: var(--font-serif); font-size: 0.95rem; font-weight: 700;
      color: var(--text-1); margin-bottom: 10px; line-height: 1.4;
    }
    .citation-text {
      font-family: var(--font-mono); font-size: 0.8rem; line-height: 1.7;
      color: var(--text-2); background: var(--bg-2); padding: 12px 16px;
      border-radius: var(--r-sm); margin-bottom: 14px;
      border: 1px solid var(--border); word-break: break-all;
    }
    .citation-text em { font-style: italic; }
    .citation-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .cite-meta { font-size: 0.73rem; color: var(--text-4); margin-left: auto; }
    .sort-select {
      padding: 8px 14px; border: 1.5px solid var(--border); border-radius: var(--r-sm);
      font-size: 0.85rem; font-family: var(--font-sans);
      background: var(--bg); color: var(--text-1); font-weight: 500;
    }
    .sort-select:focus { outline: none; border-color: var(--blue); }
  </style>
</head>
<body>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NWHDPZRK" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<div id="progress-bar"></div>
<div id="site-header-inject"></div>

<main id="main-content">
  <section class="page-header" aria-labelledby="page-heading">
    <div class="container">
      <nav class="breadcrumb" aria-label="Page navigation">
        <a href="index.html">Home</a>
        <span class="breadcrumb-sep" aria-hidden="true">›</span>
        <span aria-current="page">Articles &amp; Citations</span>
      </nav>
      <h1 class="page-title" id="page-heading">Articles &amp; Citation Index</h1>
      <p class="page-subtitle">Search, browse, and export standardized citations for all articles published in IJMEER. Supports APA 7th, MLA 9th, and BibTeX formats.</p>
    </div>
  </section>

  <section class="section" id="citations-section">
    <div class="container">

      <!-- Controls -->
      <div class="citation-controls reveal" role="group" aria-label="Citation controls">
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
          <div class="format-toggle" role="group" aria-label="Citation format">
            <button class="format-btn active" id="btn-apa" onclick="setFormat('APA')" aria-pressed="true">APA 7th</button>
            <button class="format-btn" id="btn-mla" onclick="setFormat('MLA')" aria-pressed="false">MLA 9th</button>
            <button class="format-btn" id="btn-bib" onclick="setFormat('BibTeX')" aria-pressed="false">BibTeX</button>
          </div>
          <select class="sort-select" id="sort-select" onchange="renderCitations()" aria-label="Sort articles">
            <option value="subject">Group by Subject</option>
            <option value="citations">Sort by Citations (High → Low)</option>
            <option value="title">Sort A–Z</option>
          </select>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
          <div class="search-wrap" style="width:240px;">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="search" class="search-input" id="cite-search"
                   placeholder="Search…" aria-label="Filter citations"
                   style="padding:10px 16px 10px 44px;font-size:0.85rem;" oninput="renderCitations()">
          </div>
          <button class="btn btn-outline" onclick="copyAll()" id="copy-all-btn"
                  aria-label="Copy all citations to clipboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="width:16px;height:16px;"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy All
          </button>
          <button class="btn btn-outline" onclick="exportBibTeX()" aria-label="Download BibTeX file">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="width:16px;height:16px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            .bib
          </button>
        </div>
      </div>

      <!-- Results count -->
      <div id="results-count" style="font-size:0.82rem;color:var(--text-3);font-weight:600;margin-bottom:24px;" aria-live="polite"></div>

      <!-- Citation list -->
      <div id="citation-container" role="list" aria-label="Citation list">
        <div style="padding:40px;text-align:center;color:var(--text-4);">Loading citations…</div>
      </div>

    </div>
  </section>
</main>

<div id="site-footer-inject"></div>
<script src="assets/js/components.js"></script>
<script src="assets/js/core.js"></script>
<script>
let currentFormat = 'APA';
let allPapers = [];

async function initCitations() {
  try {
    const resp = await fetch('data/papers.json');
    const data = await resp.json();
    allPapers = data.papers;
    renderCitations();
  } catch(e) {
    document.getElementById('citation-container').innerHTML =
      '<div class="alert-box warning"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>Failed to load citations. Please refresh the page.</span></div>';
  }
}

function setFormat(f) {
  currentFormat = f;
  document.querySelectorAll('.format-btn').forEach(btn => {
    const isActive = btn.id === 'btn-' + f.toLowerCase().replace('bibtex','bib');
    btn.classList.toggle('active', isActive);
    btn.setAttribute('aria-pressed', String(isActive));
  });
  renderCitations();
}

function formatCitation(p, format) {
  const doi = p.doi || `10.5281/ijmeer.${p.id}`;
  const journalName = 'INTERNATIONAL JOURNAL OF MULTIDISCIPLINARY EXPLICATION AND EMERGING RESEARCH (IJMEER)';
  const issueStr = `Vol. ${p.volume}, Issue ${p.issue}`;
  if (format === 'APA') {
    return `${p.authors} (${p.year}). ${p.title}. <em>${journalName}</em>, ${issueStr}. https://${doi}`;
  } else if (format === 'MLA') {
    return `${p.authors}. "${p.title}." <em>${journalName}</em>, ${issueStr}, ${p.year}, https://${doi}`;
  } else { // BibTeX
    const key = p.authors.split(',')[0].split(' ').pop().toLowerCase() + p.year;
    return `@article{${key},\n  author  = {${p.authors}},\n  title   = {${p.title}},\n  journal = {IJMEER},\n  year    = {${p.year}},\n  volume  = {${p.volume}},\n  number  = {${p.issue}},\n  doi     = {${doi}}\n}`;
  }
}

function renderCitations() {
  const container = document.getElementById('citation-container');
  const sort = document.getElementById('sort-select').value;
  const query = (document.getElementById('cite-search').value || '').toLowerCase().trim();

  let papers = [...allPapers];

  // Filter
  if (query) {
    papers = papers.filter(p =>
      p.title.toLowerCase().includes(query) ||
      p.authors.toLowerCase().includes(query) ||
      p.subject.toLowerCase().includes(query) ||
      (p.doi || '').toLowerCase().includes(query)
    );
  }

  // Sort
  if (sort === 'citations') papers.sort((a,b) => b.citations - a.citations);
  else if (sort === 'title') papers.sort((a,b) => a.title.localeCompare(b.title));

  // Results count
  document.getElementById('results-count').textContent =
    `Showing ${papers.length} of ${allPapers.length} articles`;

  container.innerHTML = '';

  if (!papers.length) {
    container.innerHTML = '<div class="alert-box info"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>No articles match your search. Try different keywords.</span></div>';
    return;
  }

  if (sort === 'subject') {
    // Group by subject
    const grouped = papers.reduce((acc, p) => {
      (acc[p.subject] = acc[p.subject] || []).push(p);
      return acc;
    }, {});

    Object.entries(grouped).sort((a,b) => a[0].localeCompare(b[0])).forEach(([subject, items]) => {
      const section = document.createElement('div');
      section.className = 'subject-group-block';
      section.innerHTML = `<h2 class="subject-group-header"><span>${subject}</span><span class="subject-count">${items.length}</span></h2>`;
      items.forEach(p => section.appendChild(makeCiteCard(p)));
      container.appendChild(section);
    });
  } else {
    papers.forEach(p => container.appendChild(makeCiteCard(p)));
  }
}

function makeCiteCard(p) {
  const card = document.createElement('div');
  card.className = 'citation-item';
  card.setAttribute('role', 'listitem');
  const citeText = formatCitation(p, currentFormat);
  const plainText = citeText.replace(/<em>/g,'').replace(/<\/em>/g,'').replace(/\n/g,' ');

  card.innerHTML = `
    <div class="citation-paper-title">${p.title}</div>
    <div class="citation-text" id="cite-${p.id}">${citeText}</div>
    <div class="citation-actions">
      <button class="cite-btn" onclick="copySingle('${p.id}', this)" aria-label="Copy ${currentFormat} citation for ${p.title}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px;" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy ${currentFormat}
      </button>
      ${p.pdf_url ? `<a href="${p.pdf_url}" target="_blank" rel="noopener" class="cite-btn" aria-label="Download PDF of ${p.title}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px;" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        PDF
      </a>` : ''}
      <span class="cite-meta">
        ${p.subject} &nbsp;·&nbsp; Vol. ${p.volume}, Issue ${p.issue} &nbsp;·&nbsp;
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:12px;height:12px;display:inline;vertical-align:middle;" aria-hidden="true"><path d="M3 15v4c0 1.1.9 2 2 2h14a2 2 0 0 0 2-2v-4M17 9l-5 5-5-5M12 12.8V2.5"/></svg>
        ${p.citations} cited
      </span>
    </div>`;
  card.dataset.plain = plainText;
  return card;
}

function copySingle(id, btn) {
  const el = document.getElementById('cite-' + id);
  const text = el.innerText.replace(/\n/g, ' ');
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.innerHTML;
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 2000);
    if (window.showToast) window.showToast('Citation copied to clipboard!');
  }).catch(() => { btn.textContent = '⚠ Failed'; });
}

function copyAll() {
  const btn = document.getElementById('copy-all-btn');
  const texts = allPapers
    .map(p => formatCitation(p, currentFormat).replace(/<em>/g,'').replace(/<\/em>/g,''))
    .join('\n\n');
  navigator.clipboard.writeText(texts).then(() => {
    btn.textContent = '✓ Copied All!';
    setTimeout(() => btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy All`, 2500);
    if (window.showToast) window.showToast(`${allPapers.length} citations copied!`);
  });
}

function exportBibTeX() {
  setFormat('BibTeX');
  const text = allPapers.map(p => formatCitation(p, 'BibTeX')).join('\n\n');
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'ijmeer-citations.bib'; a.click();
  if (window.showToast) window.showToast('BibTeX file downloaded!');
}

initCitations();
</script>
</body>
</html>
